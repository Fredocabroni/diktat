# Railway service: diktat-api
# TODO(railway): create the service in Railway dashboard, set RAILWAY_TOKEN secret in GitHub.
# Until then this file documents the intended deployment shape; nothing executes.

[build]
builder = "NIXPACKS"
# Nixpacks runs its own implicit `pnpm install --frozen-lockfile` install
# phase BEFORE this buildCommand fires. With no NODE_ENV in [env] below,
# that implicit install runs in default (non-production) mode, so devDeps
# — including `turbo` (a root devDep) — are installed and present on
# $PATH for the buildCommand to use. The buildCommand therefore needs
# only the build step itself; no second install required.
buildCommand = "pnpm turbo build --filter=@diktat/api"

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# NODE_ENV is intentionally NOT set here. Railway's [env] applies to BOTH
# build and runtime; setting NODE_ENV=production here would propagate to
# Nixpacks's implicit install phase and silently skip every devDep
# (turbo, typescript, etc.), then the buildCommand would either fail with
# "turbo: command not found" or stall on pnpm's interactive "reinstall
# from scratch?" prompt. Runtime NODE_ENV=production is supplied
# separately by the Railway dashboard service env (set out-of-band) so
# the build environment and the runtime environment are correctly
# decoupled.
[env]
PORT = "${{PORT}}"
