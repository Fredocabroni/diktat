name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  verify:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      # Reviewer gate-integrity script test. Runs against fixtures of
      # real review bodies + every observed and likely upstream error
      # shape; needs no Anthropic credits. Proves both directions:
      # real reviews pass, errors fail red. Future regressions in
      # .github/scripts/check-review-output.sh are caught here before
      # they ship.
      - name: Verify reviewer gate-integrity script
        run: bash .github/scripts/__tests__/check-review-output.test.sh
