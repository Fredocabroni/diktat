name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  verify:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Least-privilege token scope, declared at the JOB level (not the
    # workflow level) so any future job added to this workflow defaults
    # to `{}` and must opt in to its own permissions explicitly. PR #71
    # round-2 reviewer LOW. Audited 2026-06-22: this job runs lint +
    # typecheck + test + the reviewer gate-integrity script — none post
    # PR comments, write statuses, create check-runs, or call any
    # GitHub API mutation. `contents: read` is the minimum needed for
    # actions/checkout. If a future step in THIS job needs broader
    # scope (status post, PR comment, package publish), tighten this
    # block to name only the additional permission explicitly and
    # re-review the threat model — do not widen wholesale.
    permissions:
      contents: read
    steps:
      # actions/checkout@v4.2.2 — SHA-pinned. PR #70 round-1 reviewer
      # HIGH. Even though ci.yml does not inject ANTHROPIC_API_KEY,
      # it holds GITHUB_TOKEN (implicit, contents-read+) and runs
      # `pnpm turbo test` on every push to main — a test runner
      # with full working-tree + node_modules access. A moved `v4`
      # tag could exfiltrate the token or inject malicious code into
      # the install layer before any subsequent step runs its pinned
      # content. Same SHA as the four workflows pinned in PR #68 for
      # repo-wide consistency.
      # Default shallow clone (depth 1) — the verify job runs vanilla
      # `pnpm turbo {lint,typecheck,test}` invocations with NO
      # `--affected` / `--filter=...[main]` / changeset flags and the
      # reviewer gate-integrity test script uses no git-history refs.
      # PR #71 round-1 reviewer MED. If a future step needs ancestry
      # (Turbo affected-detection, coverage-diff, Changesets, etc.),
      # add `fetch-depth: 2` (or the minimum required) explicitly with
      # a comment.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # pnpm/action-setup@v4.4.0 — SHA-pinned. Same threat model:
      # runs before Node + npm cache exist, has read access to the
      # working tree and the lockfile, configures the package manager
      # subsequent steps trust. PR #70 round-1 reviewer HIGH.
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.9

      # actions/setup-node@v4.4.0 — SHA-pinned. Same threat model:
      # `cache: pnpm` enables a post-job cache-save hook with write
      # access to the GitHub Actions cache layer. A tag-move that
      # injects code at node-setup runs before the cache key is
      # scoped. PR #70 round-1 reviewer HIGH.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test

      # Reviewer gate-integrity script test. Runs against fixtures of
      # real review bodies + every observed and likely upstream error
      # shape; needs no Anthropic credits. Proves both directions:
      # real reviews pass, errors fail red. Future regressions in
      # .github/scripts/check-review-output.sh are caught here before
      # they ship.
      - name: Verify reviewer gate-integrity script
        run: bash .github/scripts/__tests__/check-review-output.test.sh
