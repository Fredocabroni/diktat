name: claude-migrate-review

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "packages/db/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-review:
    name: schema-reviewer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate via repo Variable: set ENABLE_CLAUDE_REVIEW=true to activate
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: Run schema-reviewer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Run the schema-reviewer subagent on the supabase/migrations/ files changed in this PR. Post the verdict (APPROVE or BLOCK) and full checklist as a PR comment via gh." \
            --model claude-sonnet-4-6 \
            --output-format text
