name: claude-migrate-review

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "packages/db/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  # Docs-only guard — harmonized with claude-review.yml. The
  # workflow-level `paths:` filter already constrains triggers to
  # supabase/migrations/** + packages/db/**, so this guard is mostly
  # redundant on its current shape (those paths are always `code`).
  # We add it anyway for symmetry with claude-review.yml and to
  # future-proof against any widening of the workflow trigger.
  changes:
    name: classify-diff
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      # actions/checkout@v4.2.2 — SHA-pinned. The `changes` classifier
      # output gates whether the schema reviewer runs at all; the
      # checkout is part of the trust boundary that determines the
      # review surface. PR #67 round-2 reviewer MEDIUM-3.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: filter
        # dorny/paths-filter@v4.0.1 (SHA pin — trust-boundary action).
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'supabase/migrations/**'
              - '.github/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'vitest.config.*'
              - 'vite.config.*'
              - '.nvmrc'
              - '.npmrc'
              - 'supabase/config.toml'
            docs:
              - 'docs/**'
              - 'README*'
              - '*.md'

  schema-review:
    name: schema-reviewer
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate via repo Variable: set ENABLE_CLAUDE_REVIEW=true to activate
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    steps:
      # actions/checkout@v4.2.2 — SHA-pinned. The schema-reviewer agent
      # reads migration files from the working tree; a moved `v4` tag
      # could substitute attacker-controlled SQL diffs and shape what
      # the reviewer reports. PR #67 round-2 reviewer MEDIUM-3.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # actions/setup-node@v4.4.0 — SHA-pinned. Same threat model as
      # claude-review.yml: this job receives ANTHROPIC_API_KEY in the
      # reviewer step's env; tag-move at node-setup runs before the
      # credential is scoped. PR #67 round-2 reviewer MEDIUM-3.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      # Pinned to the stable channel (not floating latest) — this is a
      # key-bearing review step; the gate should not track npm's
      # default-pull velocity. Bump deliberately via the stable
      # promotion cadence. PR #71 round-2 MED.
      - name: Install Claude Code
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'false' }}
        run: npm i -g @anthropic-ai/claude-code@2.1.176

      # Capture-then-post pattern, harmonized with claude-review.yml.
      # The prior legacy shape asked the agent to shell out to
      # `gh pr comment` itself — claude -p's headless Bash-permission
      # gate blocked that call, and the step also had no GH_TOKEN in
      # env, so schema-reviewer never actually posted ANY comment.
      # The check exited 0 from `|| true` and the silent-APPROVE
      # shape we saw on PRs #45 / #46 was the consequence: a check
      # bucket with a green tick and no body.
      #
      # The new shape captures stdout to a file, captures the exit
      # code, and posts via gh pr comment from a step that does have
      # GH_TOKEN. Same gate-integrity script as claude-review.yml.
      - name: Run schema-reviewer
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'false' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          claude -p "Run the schema-reviewer subagent on the supabase/migrations/ files changed in this PR. Output ONLY the review report in markdown. The VERY FIRST non-blank line of your output MUST be a markdown header (e.g. '# Schema Review') — do not precede it with any preamble, and do not follow the report with any closing summary, meta-comment, or note about the report itself (e.g. never write 'the report above is complete'). The report IS your entire output. Do NOT edit files, request write or file permissions, run shell commands, or take any tool action of any kind. You are a read-only reviewer: if the diff has defects, name them and recommend the fix IN THE REPORT — never apply or offer to apply changes yourself. A human approves every change." \
            --model claude-sonnet-4-6 \
            --output-format text > review_output.md
          echo "$?" > review_exit_code
          set -e

      - name: Post review
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -o pipefail
          exit_code=$(cat review_exit_code 2>/dev/null || echo 1)
          # check-review-output.sh contract:
          #   exit 0 + stdout "ok"    → real review, post review_output.md.
          #   exit 0 + stdout "empty" → no scope, post nothing.
          #   exit 1 + stdout REASON  → upstream failure. REASON is a
          #                              CONTROLLED string (classified
          #                              message, no raw agent body).
          #                              Post REASON, log raw stdout,
          #                              exit 1.
          if status=$(.github/scripts/check-review-output.sh review_output.md "$exit_code"); then
            case "$status" in
              ok)
                gh pr comment "$PR_NUMBER" --body-file review_output.md
                ;;
              empty)
                echo "schema-reviewer produced no substantive output (no files in scope)"
                ;;
              *)
                echo "::error::unrecognized status from check-review-output.sh: $status"
                exit 1
                ;;
            esac
          else
            # Failure branch: post the CONTROLLED reason from the
            # script (NOT --body-file review_output.md). Exfil
            # hardening per PR #51 round-1 security-reviewer M1.
            # See claude-review.yml's matching block for the full
            # rationale.
            gh pr comment "$PR_NUMBER" --body "$status" || true
            echo "::group::raw agent stdout (workflow log only — not posted to PR)"
            cat review_output.md || true
            echo "::endgroup::"
            exit 1
          fi

      # Docs-only audit signal — harmonized with claude-review.yml.
      # Fires ONLY when the PR is PROVABLY docs-only (docs touched AND
      # no code-allowlist match). The vars-disabled path stays clean
      # because both outputs are empty strings and neither half of the
      # AND matches.
      - name: Audit — docs-only diff, schema-reviewer skipped
        if: ${{ needs.changes.outputs.code == 'false' && needs.changes.outputs.docs == 'true' }}
        run: |
          echo "docs-only diff — schema-reviewer agent skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "docs-only diff — schema-reviewer agent skipped"
