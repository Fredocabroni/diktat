name: claude-review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: ${{ matrix.reviewer.name }}
    runs-on: ubuntu-latest
    # Each reviewer is its own parallel matrix job with an independent
    # timeout. Previously all three ran sequentially in one 10-minute job,
    # which starved addiction-auditor (see PR #23). 12 min covers setup
    # (~1-2 min) plus one Claude review with comfortable headroom.
    timeout-minutes: 12
    # Gate via repo Variable (Settings → Secrets and variables → Variables):
    #   set ENABLE_CLAUDE_REVIEW=true once ANTHROPIC_API_KEY secret is configured.
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    strategy:
      # One reviewer timing out must not cancel the other two.
      fail-fast: false
      matrix:
        reviewer:
          - name: security-reviewer
            prompt: "Run the security-reviewer subagent on this PR's diff. Output ONLY the review report in markdown — no preamble, no commentary, no closing remarks. Do not attempt to post it or run any shell command."
          - name: copy-linter
            prompt: "Run the copy-linter subagent on apps/web/**/*.tsx, apps/bots/**/templates/**, and any packages/ai-fabric/src/prompts/* files changed in this PR. Output ONLY the review report in markdown — no preamble, no commentary, no closing remarks. Do not attempt to post it or run any shell command."
          - name: addiction-auditor
            prompt: "Run the addiction-auditor subagent on engagement-mechanic changes in this PR. Output ONLY the review report in markdown — no preamble, no commentary, no closing remarks. Do not attempt to post it or run any shell command."
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      # NOTE: `cache: pnpm` removed deliberately. None of the reviewer
      # jobs run `pnpm install` — they only invoke `claude -p` on the
      # checked-out diff. setup-node@v4's post-job cache-save hook then
      # calls setFailed() because the cache target path doesn't exist,
      # which marks the whole job FAILURE even though the review itself
      # succeeded (see PR investigation of #38 reviewer failures).
      # Adding a `pnpm install` purely to populate a cache the reviews
      # don't use would be wasteful — drop the cache input instead.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      # The reviewer step CAPTURES agent stdout to a file and does NOT
      # have GH_TOKEN in its env. The Post step (next) reads the file
      # and runs `gh pr comment` from the workflow shell — the agent
      # never touches the shell invocation. This shape closes three
      # problems at once that the prior single-step shape had:
      #   - claude -p's bash-permission gate blocked the agent's own
      #     `gh pr comment` call in headless mode (no interactive
      #     approver in CI). Now the agent does not shell out.
      #   - Prompt-to-shell injection — PR-sourced content reaching a
      #     constructed shell command. Now the agent only writes
      #     markdown to stdout; `gh pr comment --body-file` reads the
      #     captured file with no shell interpolation.
      #   - GH_TOKEN in the agent's environment, where the Bash tool
      #     could exfiltrate it via any subcommand. Now the token lives
      #     only in the Post step.
      - name: Run ${{ matrix.reviewer.name }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_PROMPT: ${{ matrix.reviewer.prompt }}
        # The previous `|| true` swallowed claude -p's exit code,
        # silently green-stamping any API failure as "no scope" (PRs
        # #48, #49, #50 — Anthropic credit exhaustion). We now CAPTURE
        # the exit code to a file; the Post step gates on both
        # (claude exit == 0) AND (markdown header present in output).
        # See .github/scripts/check-review-output.sh for the detection.
        #
        # future-constraint (PR #51 r1 security-reviewer M3): the
        # $REVIEW_PROMPT expansion is double-quoted so the shell
        # treats it as a single argument, and the value comes from
        # matrix.reviewer.prompt — checked-in workflow YAML, not a
        # user-controllable input. If REVIEW_PROMPT is ever moved to
        # workflow_dispatch input, a PR label, an issue title, or any
        # other PR-author-controllable source, the value must be
        # written to a temp file first and read via the CLI's input-
        # file flag (or `claude -p "$(cat tempfile)"`) so that PR-
        # sourced text never reaches a shell word boundary OR
        # `claude -p`'s own argument parser.
        run: |
          set +e
          claude -p "$REVIEW_PROMPT" \
            --model claude-sonnet-4-6 \
            --output-format text > review_output.md
          echo "$?" > review_exit_code
          set -e

      # Gate the captured output via the shared detection script. The
      # script exits 0 + "ok" for a real review (header present);
      # 0 + "empty" for legitimate no-scope (no comment posted);
      # 1 for any upstream failure (body posted for visibility, job
      # fails red). This replaces the prior whitespace-only check
      # which couldn't tell a legitimate empty from a credit-error
      # body that just lacked a header.
      - name: Post review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -o pipefail
          exit_code=$(cat review_exit_code 2>/dev/null || echo 1)
          # check-review-output.sh contract:
          #   exit 0 + stdout "ok"    → real review, post review_output.md.
          #   exit 0 + stdout "empty" → no scope, post nothing.
          #   exit 1 + stdout REASON  → upstream failure. REASON is a
          #                              CONTROLLED string (classified
          #                              message, no raw agent body).
          #                              Post REASON, log raw stdout,
          #                              exit 1.
          if status=$(.github/scripts/check-review-output.sh review_output.md "$exit_code"); then
            case "$status" in
              ok)
                gh pr comment "$PR_NUMBER" --body-file review_output.md
                ;;
              empty)
                echo "reviewer produced no substantive output (no files in scope)"
                ;;
              *)
                echo "::error::unrecognized status from check-review-output.sh: $status"
                exit 1
                ;;
            esac
          else
            # Failure branch: post the CONTROLLED reason from the
            # script (NOT --body-file review_output.md). Exfil
            # hardening per PR #51 round-1 security-reviewer M1 — a
            # hijacked subagent or accidental secret-in-stdout would
            # otherwise be published to the PR as a comment visible
            # to everyone with repo access. The raw body goes to the
            # workflow log only (collapsed group below), and the gate
            # `exit 1` is the merge-blocker.
            gh pr comment "$PR_NUMBER" --body "$status" || true
            echo "::group::raw agent stdout (workflow log only — not posted to PR)"
            cat review_output.md || true
            echo "::endgroup::"
            exit 1
          fi
