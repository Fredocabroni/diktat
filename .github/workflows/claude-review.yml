name: claude-review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: ${{ matrix.reviewer.name }}
    runs-on: ubuntu-latest
    # Each reviewer is its own parallel matrix job with an independent
    # timeout. Previously all three ran sequentially in one 10-minute job,
    # which starved addiction-auditor (see PR #23). 12 min covers setup
    # (~1-2 min) plus one Claude review with comfortable headroom.
    timeout-minutes: 12
    # Gate via repo Variable (Settings → Secrets and variables → Variables):
    #   set ENABLE_CLAUDE_REVIEW=true once ANTHROPIC_API_KEY secret is configured.
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    strategy:
      # One reviewer timing out must not cancel the other two.
      fail-fast: false
      matrix:
        reviewer:
          - name: security-reviewer
            prompt: "Run the security-reviewer subagent on this PR's diff. After producing the report, post it as a single PR comment by invoking the Bash tool with: gh pr comment \"$PR_NUMBER\" --body \"$REPORT\". The GITHUB_TOKEN with pull-requests+issues:write is already exported as GH_TOKEN in the shell, so gh authenticates automatically. Do NOT use any MCP tool — the GitHub MCP server is not granted permission in this CI environment and silently no-ops."
          - name: copy-linter
            prompt: "Run the copy-linter subagent on apps/web/**/*.tsx, apps/bots/**/templates/**, and any packages/ai-fabric/src/prompts/* files changed in this PR. After producing the report, post it as a PR comment by invoking the Bash tool with: gh pr comment \"$PR_NUMBER\" --body \"$REPORT\". The GITHUB_TOKEN is already exported as GH_TOKEN. Do NOT use any MCP tool."
          - name: addiction-auditor
            prompt: "Run the addiction-auditor subagent on engagement-mechanic changes in this PR. After producing the report, post it as a PR comment by invoking the Bash tool with: gh pr comment \"$PR_NUMBER\" --body \"$REPORT\". The GITHUB_TOKEN is already exported as GH_TOKEN. Do NOT use any MCP tool."
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      # NOTE: `cache: pnpm` removed deliberately. None of the reviewer
      # jobs run `pnpm install` — they only invoke `claude -p` on the
      # checked-out diff. setup-node@v4's post-job cache-save hook then
      # calls setFailed() because the cache target path doesn't exist,
      # which marks the whole job FAILURE even though the review itself
      # succeeded (see PR investigation of #38 reviewer failures).
      # Adding a `pnpm install` purely to populate a cache the reviews
      # don't use would be wasteful — drop the cache input instead.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      # GH_TOKEN + PR_NUMBER are exported so the agent can post via
      # `gh pr comment` (the canonical shell path). The default
      # GITHUB_TOKEN inherits the workflow's `pull-requests: write` +
      # `issues: write` permissions (above), and PR comments are issue
      # comments per the GitHub API — so `gh pr comment` works without
      # any additional scope. The prior workflow expected the agent to
      # post via the GitHub MCP server, which has no permission grant
      # in this CI environment; the agent's stdout in past runs of #38
      # literally surfaced "The MCP GitHub tools need explicit
      # permission grants in this environment." With this shell path
      # the agent has a working post route that doesn't need MCP grants.
      - name: Run ${{ matrix.reviewer.name }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_PROMPT: ${{ matrix.reviewer.prompt }}
        # `|| true` kept on purpose: these reviewers are advisory-but-
        # visible. A real blocking gate (parseable verdict → exit code
        # → fail the job on BLOCK) is logged as future work; not built
        # tonight.
        run: |
          claude -p "$REVIEW_PROMPT" \
            --model claude-sonnet-4-6 \
            --output-format text || true
