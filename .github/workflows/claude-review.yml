name: claude-review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ----------------------------------------------------------------------
  # Docs-only guard. Classifies the PR diff into `code` and `docs`
  # outputs. Reviewer matrix jobs gate their agent-run + post steps on
  # `code == 'true'`; a docs-only PR concludes each reviewer job
  # SUCCESS without invoking `claude -p` and without burning Anthropic
  # credits. Closes the recurring docs-only context-bleed pattern
  # (PRs #47, #49, #50, #54, #55, #57, plus PR #56's final docs-commit
  # cycle) that needed admin-override merges.
  #
  # Pin posture: dorny/paths-filter is SHA-pinned because it's the
  # action that decides whether the security reviewer runs — a moved
  # tag could reclassify a code diff as docs-only and suppress the
  # review. Trust-boundary action. actions/checkout + actions/setup-node
  # are also SHA-pinned (PR #68 / PR #67 round-2 reviewer MEDIUM-3) —
  # see the comment block at each step for the threat model.
  changes:
    name: classify-diff
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      # actions/checkout@v4.2.2 — SHA-pinned. The `changes` classifier
      # output gates whether the agent runs at all, so the checkout is
      # part of the trust boundary that determines the review surface.
      # PR #67 round-2 reviewer MEDIUM-3.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: filter
        # dorny/paths-filter@v4.0.1 (2026-03-17), pinned to the release
        # commit SHA. See header note above for the trust-boundary
        # rationale on this specific pin.
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'supabase/migrations/**'
              - '.github/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'vitest.config.*'
              - 'vite.config.*'
              - '.nvmrc'
              - '.npmrc'
              - 'supabase/config.toml'
            docs:
              - 'docs/**'
              - 'README*'
              - '*.md'

  review:
    name: ${{ matrix.reviewer.name }}
    needs: [changes]
    runs-on: ubuntu-latest
    # Each reviewer is its own parallel matrix job with an independent
    # timeout. Previously all three ran sequentially in one 10-minute job,
    # which starved addiction-auditor (see PR #23). 12 min covers setup
    # (~1-2 min) plus one Claude review with comfortable headroom.
    timeout-minutes: 12
    # Gate via repo Variable (Settings → Secrets and variables → Variables):
    #   set ENABLE_CLAUDE_REVIEW=true once ANTHROPIC_API_KEY secret is configured.
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    strategy:
      # One reviewer timing out must not cancel the other two.
      fail-fast: false
      matrix:
        reviewer:
          - name: security-reviewer
            prompt: "Run the security-reviewer subagent on this PR's diff. Output ONLY the review report in markdown. The VERY FIRST non-blank line of your output MUST be a markdown header (e.g. '# Security Review') — do not precede it with any preamble, and do not follow the report with any closing summary, meta-comment, or note about the report itself (e.g. never write 'the report above is complete'). The report IS your entire output. Do NOT edit files, request write or file permissions, run shell commands, or take any tool action of any kind. You are a read-only reviewer: if the diff has defects, name them and recommend the fix IN THE REPORT — never apply or offer to apply changes yourself. A human approves every change."
          - name: copy-linter
            prompt: "Run the copy-linter subagent on apps/web/**/*.tsx, apps/bots/**/templates/**, and any packages/ai-fabric/src/prompts/* files changed in this PR. Output ONLY the review report in markdown. The VERY FIRST non-blank line of your output MUST be a markdown header (e.g. '# Copy Review') — do not precede it with any preamble, and do not follow the report with any closing summary, meta-comment, or note about the report itself (e.g. never write 'the report above is complete'). The report IS your entire output. Do NOT edit files, request write or file permissions, run shell commands, or take any tool action of any kind. You are a read-only reviewer: if the diff has defects, name them and recommend the fix IN THE REPORT — never apply or offer to apply changes yourself. A human approves every change."
          - name: addiction-auditor
            prompt: "Run the addiction-auditor subagent on engagement-mechanic changes in this PR. Output ONLY the review report in markdown. The VERY FIRST non-blank line of your output MUST be a markdown header (e.g. '# Addiction Audit') — do not precede it with any preamble, and do not follow the report with any closing summary, meta-comment, or note about the report itself (e.g. never write 'the report above is complete'). The report IS your entire output. Do NOT edit files, request write or file permissions, run shell commands, or take any tool action of any kind. You are a read-only reviewer: if the diff has defects, name them and recommend the fix IN THE REPORT — never apply or offer to apply changes yourself. A human approves every change."
    steps:
      # actions/checkout@v4.2.2 — SHA-pinned. The agent runs against
      # whatever ends up in the working tree; a moved `v4` tag could
      # substitute a modified diff and shape what the reviewer sees.
      # PR #67 round-2 reviewer MEDIUM-3.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # pnpm/action-setup@v4.4.0 — SHA-pinned. Same threat model as
      # the surrounding actions/checkout + actions/setup-node pins:
      # runs in a job that holds `pull-requests: write` and later
      # receives ANTHROPIC_API_KEY in env. A tag-move at pnpm-setup
      # runs before either credential is scoped. PR #68 round-1
      # reviewer HIGH-1.
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.9

      # NOTE: `cache: pnpm` removed deliberately. None of the reviewer
      # jobs run `pnpm install` — they only invoke `claude -p` on the
      # checked-out diff. setup-node@v4's post-job cache-save hook then
      # calls setFailed() because the cache target path doesn't exist,
      # which marks the whole job FAILURE even though the review itself
      # succeeded (see PR investigation of #38 reviewer failures).
      # Adding a `pnpm install` purely to populate a cache the reviews
      # don't use would be wasteful — drop the cache input instead.
      # actions/setup-node@v4.4.0 — SHA-pinned. Same threat model: this
      # job has access to GITHUB_TOKEN (write scope per the job's
      # permissions block) and later receives ANTHROPIC_API_KEY in the
      # reviewer step's env. A tag-move that injects code at node-setup
      # time runs before either credential is scoped down. PR #67 round-2
      # reviewer MEDIUM-3.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      # Pinned to the stable channel (not floating latest) — this is a
      # key-bearing review step; the gate should not track npm's
      # default-pull velocity. Bump deliberately via the stable
      # promotion cadence. PR #71 round-2 MED.
      - name: Install Claude Code
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'false' }}
        run: npm i -g @anthropic-ai/claude-code@2.1.176

      # The reviewer step CAPTURES agent stdout to a file and does NOT
      # have GH_TOKEN in its env. The Post step (next) reads the file
      # and runs `gh pr comment` from the workflow shell — the agent
      # never touches the shell invocation. This shape closes three
      # problems at once that the prior single-step shape had:
      #   - claude -p's bash-permission gate blocked the agent's own
      #     `gh pr comment` call in headless mode (no interactive
      #     approver in CI). Now the agent does not shell out.
      #   - Prompt-to-shell injection — PR-sourced content reaching a
      #     constructed shell command. Now the agent only writes
      #     markdown to stdout; `gh pr comment --body-file` reads the
      #     captured file with no shell interpolation.
      #   - GH_TOKEN in the agent's environment, where the Bash tool
      #     could exfiltrate it via any subcommand. Now the token lives
      #     only in the Post step.
      - name: Run ${{ matrix.reviewer.name }}
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'false' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_PROMPT: ${{ matrix.reviewer.prompt }}
        # The previous `|| true` swallowed claude -p's exit code,
        # silently green-stamping any API failure as "no scope" (PRs
        # #48, #49, #50 — Anthropic credit exhaustion). We now CAPTURE
        # the exit code to a file; the Post step gates on both
        # (claude exit == 0) AND (markdown header present in output).
        # See .github/scripts/check-review-output.sh for the detection.
        #
        # future-constraint (PR #51 r1 security-reviewer M3): the
        # $REVIEW_PROMPT expansion is double-quoted so the shell
        # treats it as a single argument, and the value comes from
        # matrix.reviewer.prompt — checked-in workflow YAML, not a
        # user-controllable input. If REVIEW_PROMPT is ever moved to
        # workflow_dispatch input, a PR label, an issue title, or any
        # other PR-author-controllable source, the value must be
        # written to a temp file first and read via the CLI's input-
        # file flag (or `claude -p "$(cat tempfile)"`) so that PR-
        # sourced text never reaches a shell word boundary OR
        # `claude -p`'s own argument parser.
        run: |
          set +e
          claude -p "$REVIEW_PROMPT" \
            --model claude-sonnet-4-6 \
            --output-format text > review_output.md
          echo "$?" > review_exit_code
          set -e

      # Gate the captured output via the shared detection script. The
      # script exits 0 + "ok" for a real review (header present);
      # 0 + "empty" for legitimate no-scope (no comment posted);
      # 1 for any upstream failure (body posted for visibility, job
      # fails red). This replaces the prior whitespace-only check
      # which couldn't tell a legitimate empty from a credit-error
      # body that just lacked a header.
      - name: Post review
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -o pipefail
          exit_code=$(cat review_exit_code 2>/dev/null || echo 1)
          # check-review-output.sh contract:
          #   exit 0 + stdout "ok"    → real review, post review_output.md.
          #   exit 0 + stdout "empty" → no scope, post nothing.
          #   exit 1 + stdout REASON  → upstream failure. REASON is a
          #                              CONTROLLED string (classified
          #                              message, no raw agent body).
          #                              Post REASON, log raw stdout,
          #                              exit 1.
          if status=$(.github/scripts/check-review-output.sh review_output.md "$exit_code"); then
            case "$status" in
              ok)
                gh pr comment "$PR_NUMBER" --body-file review_output.md
                ;;
              empty)
                echo "reviewer produced no substantive output (no files in scope)"
                ;;
              *)
                echo "::error::unrecognized status from check-review-output.sh: $status"
                exit 1
                ;;
            esac
          else
            # Failure branch: post the CONTROLLED reason from the
            # script (NOT --body-file review_output.md). Exfil
            # hardening per PR #51 round-1 security-reviewer M1 — a
            # hijacked subagent or accidental secret-in-stdout would
            # otherwise be published to the PR as a comment visible
            # to everyone with repo access. The raw body goes to the
            # workflow log only (collapsed group below), and the gate
            # `exit 1` is the merge-blocker.
            gh pr comment "$PR_NUMBER" --body "$status" || true
            echo "::group::raw agent stdout (workflow log only — not posted to PR)"
            cat review_output.md || true
            echo "::endgroup::"
            exit 1
          fi

      # Docs-only path: emit a visible "this was intentional" signal
      # into the run summary so a skipped review reads as a designed
      # outcome, not a misconfig. Inverted semantics — fires ONLY when
      # the PR is PROVABLY docs-only (docs touched AND no code-allowlist
      # match). Anything the code allowlist doesn't recognize
      # (Dockerfile, root *.sh, supabase/functions/**, .env.example,
      # Makefile, etc.) falls through to the agent-run gate above. This
      # also keeps the vars-disabled path clean: when `changes` was
      # skipped via ENABLE_CLAUDE_REVIEW, both outputs are empty strings
      # and neither half of the AND matches.
      - name: Audit — docs-only diff, reviewer skipped
        if: ${{ needs.changes.outputs.code == 'false' && needs.changes.outputs.docs == 'true' }}
        run: |
          echo "docs-only diff — reviewer agent skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "docs-only diff — reviewer agent skipped"
