name: claude-review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: ${{ matrix.reviewer.name }}
    runs-on: ubuntu-latest
    # Each reviewer is its own parallel matrix job with an independent
    # timeout. Previously all three ran sequentially in one 10-minute job,
    # which starved addiction-auditor (see PR #23). 12 min covers setup
    # (~1-2 min) plus one Claude review with comfortable headroom.
    timeout-minutes: 12
    # Gate via repo Variable (Settings → Secrets and variables → Variables):
    #   set ENABLE_CLAUDE_REVIEW=true once ANTHROPIC_API_KEY secret is configured.
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    strategy:
      # One reviewer timing out must not cancel the other two.
      fail-fast: false
      matrix:
        reviewer:
          - name: security-reviewer
            prompt: "Run the security-reviewer subagent on this PR's diff. Output ONLY the review report in markdown — no preamble, no commentary, no closing remarks. Do not attempt to post it or run any shell command."
          - name: copy-linter
            prompt: "Run the copy-linter subagent on apps/web/**/*.tsx, apps/bots/**/templates/**, and any packages/ai-fabric/src/prompts/* files changed in this PR. Output ONLY the review report in markdown — no preamble, no commentary, no closing remarks. Do not attempt to post it or run any shell command."
          - name: addiction-auditor
            prompt: "Run the addiction-auditor subagent on engagement-mechanic changes in this PR. Output ONLY the review report in markdown — no preamble, no commentary, no closing remarks. Do not attempt to post it or run any shell command."
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      # NOTE: `cache: pnpm` removed deliberately. None of the reviewer
      # jobs run `pnpm install` — they only invoke `claude -p` on the
      # checked-out diff. setup-node@v4's post-job cache-save hook then
      # calls setFailed() because the cache target path doesn't exist,
      # which marks the whole job FAILURE even though the review itself
      # succeeded (see PR investigation of #38 reviewer failures).
      # Adding a `pnpm install` purely to populate a cache the reviews
      # don't use would be wasteful — drop the cache input instead.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      # The reviewer step CAPTURES agent stdout to a file and does NOT
      # have GH_TOKEN in its env. The Post step (next) reads the file
      # and runs `gh pr comment` from the workflow shell — the agent
      # never touches the shell invocation. This shape closes three
      # problems at once that the prior single-step shape had:
      #   - claude -p's bash-permission gate blocked the agent's own
      #     `gh pr comment` call in headless mode (no interactive
      #     approver in CI). Now the agent does not shell out.
      #   - Prompt-to-shell injection — PR-sourced content reaching a
      #     constructed shell command. Now the agent only writes
      #     markdown to stdout; `gh pr comment --body-file` reads the
      #     captured file with no shell interpolation.
      #   - GH_TOKEN in the agent's environment, where the Bash tool
      #     could exfiltrate it via any subcommand. Now the token lives
      #     only in the Post step.
      - name: Run ${{ matrix.reviewer.name }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_PROMPT: ${{ matrix.reviewer.prompt }}
        # `|| true` kept on purpose: these reviewers are advisory-but-
        # visible. A real blocking gate (parseable verdict → exit code
        # → fail the job on BLOCK) is logged as future work; not built
        # tonight.
        run: |
          claude -p "$REVIEW_PROMPT" \
            --model claude-sonnet-4-6 \
            --output-format text > review_output.md || true

      # Post the captured report as a PR comment. Empty / missing
      # outputs are logged but don't fail the step — same advisory
      # posture as the reviewer step.
      - name: Post review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -s review_output.md ]; then
            gh pr comment "$PR_NUMBER" --body-file review_output.md
          else
            echo "reviewer produced no output"
          fi
