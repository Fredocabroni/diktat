name: deploy-vercel

# TODO(vercel): activates only when VERCEL_TOKEN secret AND VERCEL_PROJECT_ID secret
# are present in repo settings. Until then this workflow is a no-op stub and does
# NOT fail CI. Per Phase 0 instruction: skip Vercel until account exists.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/shared/**"

permissions:
  contents: read

jobs:
  guard:
    name: deploy-guard
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Skip — TODO(vercel)
        run: |
          echo "Vercel deploy stub. Set repo variable ENABLE_VERCEL_DEPLOY=true and"
          echo "secrets VERCEL_TOKEN + VERCEL_PROJECT_ID + VERCEL_ORG_ID once Vercel"
          echo "account is created. Workflow is intentionally a no-op until then."

  deploy:
    name: deploy web → Vercel
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
