# Diktat Supabase local config. Generated for Phase 0.
# Override per-environment values via environment variables when needed.

project_id = "diktat"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://diktat-web1.vercel.app/**",
  # dev/preview only — production auth redirect list must be the production domain only, never this wildcard.
  "https://*-fredocabronis-projects.vercel.app/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
# 60s between sends per email deters enumeration + runaway OTP fanout.
# Supabase default of 1s was too permissive and surfaced as "code could
# not be sent" on retries during the first signup test.
max_frequency = "60s"
otp_length = 6
# 10 min expiry per NIST SP 800-63B §5.1.1.1 for out-of-band OTPs. The old
# 1-hour window made a single intercepted code usable for too long.
otp_expiry = 600

# Custom SMTP via Resend. The hosted Supabase project's built-in sender
# only delivers to team members for non-verified recipients, which is why
# the first external signup on diktat-web1.vercel.app failed with "code
# could not be sent". RESEND_API_KEY must be set on the hosted project
# (Dashboard → Project Settings → Configuration → Auth → SMTP Settings,
# OR via supabase secrets set RESEND_API_KEY=...). The sender domain must
# be verified in the Resend dashboard.
#
# Local dev uses inbucket (see [inbucket] above), so this block is inert
# for `supabase start` but authoritative for `supabase db push` + the
# `supabase config push` flow once the project is linked.
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "auth@diktat.app"
sender_name = "Diktat"

[auth.sms]
enable_signup = false
enable_confirmations = false

# X / Twitter OAuth — TODO: flip enabled = true once X_CLIENT_ID + X_CLIENT_SECRET
# are set in .env.local. env() refs resolve to empty strings when the vars are
# missing, which is harmless while enabled = false.
[auth.external.twitter]
enabled = false
client_id = "env(X_CLIENT_ID)"
secret = "env(X_CLIENT_SECRET)"
redirect_uri = ""

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
